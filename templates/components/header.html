<header class="glass-header">
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-3 px-lg-4">
            <button class="navbar-toggler order-1" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <a class="navbar-brand order-2 order-lg-1" href="{{ url_for('home') }}">
                MANVI MART
            </a>

            <div class="d-flex align-items-center gap-3 order-3 order-lg-3">
                <a class="header-action-link" href="{{ url_for('products_page') }}">SHOP</a>
                {% if current_user %}
                    <div class="dropdown">
                        <a href="#" class="header-user-chip" data-bs-toggle="dropdown" aria-label="Open account menu">
                            {{ current_user.name[0] | upper }}
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end mm-dropdown">
                            <li class="px-3 py-2 small">
                                <strong>{{ current_user.name }}</strong><br>
                                <span class="text-muted">{{ current_user.email }}</span>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="{{ url_for('logout') }}">Logout</a></li>
                        </ul>
                    </div>
                {% else %}
                    <a href="{{ url_for('login') }}" class="header-action-link">SIGN IN</a>
                {% endif %}
            </div>

            <div class="collapse navbar-collapse order-4 order-lg-2" id="navbarContent">
                <ul class="navbar-nav me-lg-auto mb-3 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('category_page', slug='women') }}">WOMAN</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('category_page', slug='men') }}">MAN</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('category_page', slug='new-arrivals') }}">NEW</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('products_page') }}">ALL</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('blogs_page') }}">EDITORIAL</a></li>
                </ul>

                <form class="header-search d-flex align-items-center" method="GET" action="{{ url_for('products_page') }}">
                    <input class="form-control" type="search" name="q" placeholder="Search">
                    <button class="btn" type="submit">GO</button>
                </form>
            </div>
        </div>
    </nav>
</header>
