<section class="product-showcase py-5">
    <div class="container">
        <div class="product-showcase-head">
            <h2 class="product-showcase-title">{{ title }}</h2>
            <a href="{{ url_for('products_page') }}" class="product-view-link">VIEW ALL</a>
        </div>

        {% set visible_products = product_list if product_list is defined else products %}
        <div class="product-grid">
            {% if visible_products %}
                {% for product in visible_products %}
                    {% include "components/product_card.html" %}
                {% endfor %}
            {% else %}
                <div class="empty-products">
                    <p class="mb-0">No products available right now.</p>
                </div>
            {% endif %}
        </div>
    </div>
</section>
