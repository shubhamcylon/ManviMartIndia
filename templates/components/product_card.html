<article class="glass-product-card modern-card">
    {% if current_user %}
    <form action="{{ url_for('wishlist_toggle', pid=product.id) }}" method="POST">
        <button class="glass-wishlist {% if product.id in wishlist_product_ids %}active{% endif %}" type="submit" aria-label="Toggle wishlist">♥</button>
    </form>
    {% else %}
    <a href="{{ url_for('login', next=request.path) }}" class="glass-wishlist" aria-label="Sign in to add wishlist">♥</a>
    {% endif %}

    <a href="{{ url_for('product_detail', pid=product.id) }}" class="product-image-wrap">
        <img
            src="{{ url_for('static', filename=product.image) if product.image else url_for('static', filename='assets/img/bannerimg.png') }}"
            alt="{{ product.name }}"
            class="product-image"
            loading="lazy">
    </a>

    <div class="product-card-body">
        <p class="product-category-label">{{ categories.get(product.category, product.category|replace('-', ' ')|title) }}</p>
        <h3 class="product-title">
            <a href="{{ url_for('product_detail', pid=product.id) }}" class="product-title-link">{{ product.name }}</a>
        </h3>
        <div class="product-bottom">
            <span class="product-price">₹{{ product.price }}</span>
            <a href="{{ url_for('product_detail', pid=product.id) }}" class="product-view-link">VIEW</a>
        </div>
    </div>
</article>
