{% extends "base.html" %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <div class="glass-why p-4">

        <div class="card-body">

            <h4 class="text-center mb-4">
                Sign In
            </h4>

            <form method="POST">
                {% if request.args.get("next") %}
                <input type="hidden" name="next" value="{{ request.args.get('next') }}">
                {% endif %}

                <input
                        type="text"
                        name="identifier"
                        class="form-control mb-3"
                        placeholder="Enter email or mobile number"
                        required>

                <input
                        type="password"
                        name="password"
                        class="form-control mb-3"
                        placeholder="Enter password"
                        required>

                <button class="btn glass-btn w-100">
                    Sign In
                </button>

            </form>

            <div class="text-center">

                <a href="{{ url_for('forgot_password') }}" class="text-decoration-none">
                    Forgot Password?
                </a>

            </div>

            <hr>

            <div class="text-center">

                Don't have an account?

                <a href="{{ url_for('signup', next=request.args.get('next')) if request.args.get('next') else url_for('signup') }}">
                    Sign Up
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
