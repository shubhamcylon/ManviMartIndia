{% extends "base.html" %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <div class="glass-why p-4">

        <h4 class="text-center mb-3">
            Forgot Password
        </h4>

        <p class="">
            Enter your email or mobile number, and we will send a password reset link to your registered email.
        </p>

        <form method="POST">

            <input
                    type="text"
                    name="identifier"
                    class="form-control mb-3"
                    placeholder="Enter email or mobile number"
                    required>

            <button class="btn glass-btn w-100">
                Send Reset Link
            </button>

        </form>

        <div class="text-center mt-3">

            <a href="{{ url_for('login') }}" class="text-decoration-none">
                Back to Login
            </a>

        </div>

    </div>

</div>

{% endblock %}
